name: Java CI CD

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CICD-Pipeline-Test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build Project
        run: mvn clean compile
      - name: Run JUnit Test
        run: mvn test

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Wait for 10 Second
        run: sleep 10
      - name: Deploy Application
        run: |
          echo "Deploying Application..."
          echo "Application Deployed Successfully"
  email:
    needs: Sending-Notification
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        uses: dawidd6/action-send-mail@v3
        with: 
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME}}
          password: ${{ secrets.GMAIL_PASSWORD}}
          subject: The Calurator is UP
          to: mpoobesh123@gmail.com
          from: GitHub Actions
          body: |
            Hello Poobesh,
            
            Your Java CI/CD Pipeline executed successfully.
            
            ✓ Build Successful

            ✓ JUnit Tests Passed

            ✓ Deployment Completed
